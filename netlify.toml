# ============================================================
# AIGündem — Netlify build ayarları
# ============================================================

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Next.js plugin — ISR, image optimization, server actions için gerekli
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache: Next.js server-rendered sayfalar için Netlify CDN üzerinden sunar
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Güvenlik: hassas dosyaların yanlışlıkla deploy edilmesini engelle
[[headers]]
  for = "/.env*"
  [headers.values]
    X-Robots-Tag = "noindex"
